name: Build DW&BI Analysis Report

on:
  push:
    branches: [main]
    paths:
      - 'II/DWBI/docs/analysis/**'
      - '.github/workflows/analysis.yml'
  pull_request:
    branches: [main]
    paths:
      - 'II/DWBI/docs/analysis/**'
      - '.github/workflows/analysis.yml'

defaults:
  run:
    working-directory: II/DWBI

jobs:
  build-analysis-report:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'DWBI')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'DWBI'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up TeX Live (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: II/DWBI/docs/analysis
          latexmk_use_lualatex: false
          latexmk_use_xelatex: true
          latexmk_shell_escape: false
          compiler: latexmk
          
      - name: Publish Analysis Report as release (package)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp II/DWBI/docs/analysis/main.pdf II/DWBI/docs/analysis/dwbi_analysis_report.pdf
          gh release delete report-latest --yes 2>/dev/null || true
          gh release create report-latest \
            --title "DW&BI Analysis Report (latest)" \
            --notes "Built from ${{ github.ref_name }} at ${{ github.sha }}." \
            II/DWBI/docs/analysis/dwbi_analysis_report.pdf
