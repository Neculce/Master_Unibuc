name: Build APD Docs

on:
  push:
    branches: [main]
    paths:
      - 'II/APD/Proiect/docs/**'
      - '.github/workflows/apd_docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'II/APD/Proiect/docs/**'
      - '.github/workflows/apd_docs.yml'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'APD')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'APD'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build APD Proiect docs (XeLaTeX)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: II/APD/Proiect/docs
          latexmk_use_lualatex: false
          latexmk_use_xelatex: true
          latexmk_shell_escape: false
          compiler: latexmk

      - name: Publish APD docs as release
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp II/APD/Proiect/docs/main.pdf II/APD/Proiect/docs/APD_Proiect.pdf
          gh release delete sbd-docs-latest --yes 2>/dev/null || true
          gh release create apd-docs-latest \
            --title "APD Proiect (latest)" \
            --notes "Proiect. Built from ${{ github.ref_name }} at ${{ github.sha }}." \
            II/APD/Proiect/docs/APD_Proiect.pdf
