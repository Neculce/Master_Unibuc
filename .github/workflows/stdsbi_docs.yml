name: Build STDSBI Docs

on:
  push:
    branches: [main]
    paths:
      - 'II/STDSBI/Assignments/**'
      - '.github/workflows/stdsbi_docs.yml'

defaults:
  run:
    working-directory: II/STDSBI

jobs:
  build-docs:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'STDSBI'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up TeX Live (XeLaTeX)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: II/STDSBI/Assignments
          latexmk_use_lualatex: false
          latexmk_use_xelatex: true
          latexmk_shell_escape: false
          compiler: latexmk
          
      - name: Publish Analysis Report as release (package)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp II/STDSBI/Assignments/main.pdf II/STDSBI/Assignments/STDSBI_Assignments.pdf
          gh release delete stdsbi-docs-latest --yes 2>/dev/null || true
          gh release create stdsbi-docs-latest \
            --title "STDSBI Assignments (latest)" \
            --notes "Built from ${{ github.ref_name }} at ${{ github.sha }}." \
            II/STDSBI/Assignments/STDSBI_Assignments.pdf
