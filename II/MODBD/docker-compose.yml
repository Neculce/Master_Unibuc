services:
  oracle-db-sv1:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: oracle-sv1
    profiles:
      - sv1
    restart: unless-stopped
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_SID: "${ORACLE_SID:-DB1}"
      ORACLE_PDB: "${ORACLE_PDB:-PDB1}"
      ORACLE_PWD: "${ORACLE_PWD}"
      ORACLE_EDITION: enterprise
      ORACLE_CHARACTERSET: "AL32UTF8"
      ENABLE_ARCHIVELOG: "true"
      INIT_SGA_SIZE: "2048"
      INIT_PGA_SIZE: "1024"
    volumes:
      - ./sv1/oradata:/opt/oracle/oradata:rw
      - ./sv1/scripts/startup:/opt/oracle/scripts/startup:rw
      - ./sv1/scripts/setup:/opt/oracle/scripts/setup:rw
      - ./sv1/scripts/etl:/opt/oracle/scripts/etl:ro
    shm_size: "2g"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 16384
    deploy:
      resources:
        limits:
          memory: 6g
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - modbd-net

