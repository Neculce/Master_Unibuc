services:
  oracle-db-1:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: tickly
    restart: unless-stopped
    ports:
      - "1515:1521"
      - "1516:5500"
    environment:
      ORACLE_SID: "DB1"
      ORACLE_PDB: "PDB1"
      ORACLE_PWD: "07072022"
      ORACLE_EDITION: enterprise
      ORACLE_CHARACTERSET: "AL32UTF8"
      ENABLE_ARCHIVELOG: "true"
      INIT_SGA_SIZE: "2048"
      INIT_PGA_SIZE: "1024"
    volumes:
      - ./oradata1:/opt/oracle/oradata:rw
      - ./scripts/startup:/opt/oracle/scripts/startup:rw
      - ./scripts/setup:/opt/oracle/scripts/setup:rw
      - ./scripts/etl:/opt/oracle/scripts/etl:ro
    shm_size: "2g"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 16384
    deploy:
      resources:
        limits:
          memory: 6g
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      dwbi-net:
        ipv4_address: 172.20.0.10

  oracle-db-2:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: tickly_
    restart: unless-stopped
    ports:
      - "1525:1521"
      - "1526:5500"
    environment:
      ORACLE_SID: "DB2"
      ORACLE_PDB: "PDB2"
      ORACLE_PWD: "07072022"
      ORACLE_EDITION: enterprise
      ORACLE_CHARACTERSET: "AL32UTF8"
      ENABLE_ARCHIVELOG: "true"
      INIT_SGA_SIZE: "2048"
      INIT_PGA_SIZE: "1024"
    volumes:
      - ./oradata2:/opt/oracle/oradata:rw
      - ./scripts/startup2:/opt/oracle/scripts/startup:rw
      - ./scripts/setup2:/opt/oracle/scripts/setup:rw
      - ./scripts/etl2:/opt/oracle/scripts/etl:ro
    shm_size: "2g"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 16384
    deploy:
      resources:
        limits:
          memory: 6g
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      dwbi-net:
        ipv4_address: 172.20.0.20

networks:
  dwbi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16